<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0a0a0a" />
  <!-- Belt-and-suspenders for SPA stale-cache: tells any well-behaved cache
       to always revalidate index.html. Real protection comes from the
       Cache-Control response header set in vercel.json; this is just a
       fallback for proxies/browsers that may ignore the HTTP header. -->
  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta name="description" content="Swimming Eagles Invitational Series — Cairo American College's annual international invitational swim meet hosted at the Hassan and Webb Aquatics Center." />

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Swimming Eagles Invitational Series" />
  <meta property="og:title" content="Swimming Eagles Invitational Series" />
  <meta property="og:description" content="Cairo American College's annual international invitational swim meet." />
  <!-- NOTE: place a 1200x630 PNG at public/og-image.png (pool photo + SEIS logo overlay) before launch.
       Social platforms (WhatsApp, Facebook, Twitter/X, LinkedIn) do NOT render SVG previews. -->
  <meta property="og:image" content="https://swimming-eagles-invitational.vercel.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Swimming Eagles Invitational Series — Cairo American College" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Swimming Eagles Invitational Series" />
  <meta name="twitter:description" content="Cairo American College's annual international invitational swim meet." />
  <meta name="twitter:image" content="https://swimming-eagles-invitational.vercel.app/og-image.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">

  <title>Swimming Eagles Invitational Series</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
